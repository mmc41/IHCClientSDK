name: build

on:
  push:
  pull_request:
    branches: [ main ]
    paths:
    - '**.cs'
    - '**.csproj'

env:
  DOTNET_VERSION: '9.x' # The .NET SDK version to use

jobs:
  build:

    name: build-${{matrix.os}}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]

    steps:
    - uses: actions/checkout@v3
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
        dotnet-quality: 'ga'

    - name: Install dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --no-restore

    - name: Test (controller-free unit tests)
      run: dotnet test tests/safe_unit_tests/safe_unit_tests.csproj --no-build

    - name: Test (headless Lab UI tests)
      # Avalonia + Skia headless rendering is validated on the Windows runner (the primary
      # development environment). Scope here rather than risk missing native render/font deps
      # on the Linux/macOS runners. safe_lab_tests is [NonParallelizable] and uses mock:// services.
      if: matrix.os == 'windows-latest'
      run: dotnet test tests/safe_lab_tests/safe_lab_tests.csproj --no-build
